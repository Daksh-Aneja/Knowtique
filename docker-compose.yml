# Knowtique — Docker Compose
# Usage: docker compose up --build

services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./knowtique.db
    volumes:
      - backend-data:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  backend-data:
