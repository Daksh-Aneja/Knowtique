# Knowtique KAEOS 1.0 — Production Docker Compose
# Usage: docker compose up --build
# Includes: PostgreSQL (persistent), Redis (caching), Backend, Frontend

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: knowtique
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowtique_dev_2026}
      POSTGRES_DB: knowtique
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowtique"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (session cache, event bus, rate limiting) ─────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Backend (FastAPI) ───────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://knowtique:${POSTGRES_PASSWORD:-knowtique_dev_2026}@postgres:5432/knowtique
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend (Vite → Nginx) ────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://backend:8001/api/v1

volumes:
  pgdata:
  redisdata:
  backend-data:
